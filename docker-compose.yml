version: "3.8"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: isoedit
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    build:
      context: ./server
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/isoedit
      - JWT_SECRET=your-super-secret-jwt-key
      - PORT=3001
      - FRONTEND_URL=http://localhost:8080
    depends_on:
      - db

  client:
    build:
      context: ./client
      args:
        - VITE_API_URL=http://localhost:3001
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  pgdata:
