services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: isoedit
    volumes:
      - pgdata:/var/lib/postgresql/data

  server:
    image: YOUR_DOCKER_USERNAME/isometric-server:latest
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/isoedit
      - JWT_SECRET=your-super-secret-jwt-key
      - PORT=3001
      - FRONTEND_URL=http://YOUR_DROPLET_IP
    depends_on:
      - db

  client:
    image: YOUR_DOCKER_USERNAME/isometric-client:latest
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  pgdata:
